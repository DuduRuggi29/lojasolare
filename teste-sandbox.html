<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Sandbox PagBank — Lojas Solare</title>
<script src="https://assets.pagseguro.com.br/checkout-sdk/npm/release/4.3.28/browser/pag-seguro.min.js"></script>
<style>
  body{font-family:monospace;background:#111;color:#0f0;padding:20px;max-width:900px}
  button{background:#0f0;color:#000;border:none;padding:12px 24px;font-size:15px;cursor:pointer;font-weight:bold;margin:6px 4px;border-radius:4px}
  button:disabled{background:#555;color:#999;cursor:not-allowed}
  #log{white-space:pre-wrap;background:#000;border:1px solid #0f0;padding:15px;margin-top:15px;min-height:150px;font-size:13px;max-height:80vh;overflow-y:auto}
  .ok{color:#0f0}.err{color:#f44}.info{color:#ff0}.dim{color:#888}
</style>
</head>
<body>
<h2>🧪 Teste Sandbox PagBank — Lojas Solare</h2>
<button id="btnPix" onclick="runPix()">▶ Testar PIX</button>
<button id="btnCard" onclick="runCard()">▶ Testar CARTÃO</button>
<button onclick="copyLog()">📋 Copiar Log</button>
<button onclick="document.getElementById('log').innerHTML=''">🗑 Limpar</button>
<div id="log">Clique em um dos botões acima...</div>

<script>
const PROXY = '/api/sandbox-proxy';
const log = document.getElementById('log');

function ts() { return new Date().toLocaleTimeString('pt-BR'); }
function w(msg, cls='') { log.innerHTML += `<span class="${cls}">[${ts()}] ${msg}\n</span>`; log.scrollTop=1e9; }
function wj(label, obj) { w('─── '+label+' ───','info'); w(JSON.stringify(obj,null,2)); }

async function runPix() {
  log.innerHTML = '';
  document.getElementById('btnPix').disabled = true;
  w('=== TESTE 1: PIX ===','ok');
  w('Enviando para proxy backend...','dim');
  try {
    const r = await fetch(PROXY+'?action=pix');
    const d = await r.json();
    w('HTTP Status: '+d._status, d._status===201?'ok':'err');
    wj('REQUEST — POST https://sandbox.api.pagseguro.com/orders', d._request);
    wj('RESPONSE (HTTP '+d._status+')', d._response);
    if (d._status===201) w('✅ PIX OK — Pedido: '+d._response.id,'ok');
    else w('❌ PIX FALHOU','err');
  } catch(e) { w('❌ '+e.message,'err'); }
  document.getElementById('btnPix').disabled = false;
}

async function runCard() {
  log.innerHTML = '';
  document.getElementById('btnCard').disabled = true;
  w('=== TESTE 2: CARTÃO DE CRÉDITO ===','ok');

  // Etapa 1: buscar chave pública via proxy
  w('Etapa 1/3 — Buscando chave pública...','dim');
  let publicKey;
  try {
    const pkRes = await fetch(PROXY+'?action=public-key');
    const pkData = await pkRes.json();
    wj('GET /public-keys/card — HTTP '+pkRes.status, pkData);
    publicKey = pkData.public_key;
    w('✅ Chave pública obtida','ok');
  } catch(e) { w('❌ Erro chave pública: '+e.message,'err'); document.getElementById('btnCard').disabled=false; return; }

  // Etapa 2: criptografar cartão no browser com SDK PagBank
  w('Etapa 2/3 — Criptografando cartão com PagSeguro.encryptCard()...','dim');
  if (typeof PagSeguro === 'undefined') {
    w('❌ SDK PagBank não carregado. Verifique sua conexão com a internet.','err');
    document.getElementById('btnCard').disabled = false; return;
  }
  const enc = PagSeguro.encryptCard({ publicKey, holder:'Jose da Silva', number:'4111111111111111', expMonth:'12', expYear:'2026', securityCode:'123' });
  if (!enc.encryptedCard) { w('❌ Erro SDK: '+JSON.stringify(enc.errors),'err'); document.getElementById('btnCard').disabled=false; return; }
  w('✅ Cartão criptografado com SDK oficial PagBank','ok');

  // Etapa 3: criar pedido via proxy
  w('Etapa 3/3 — Criando pedido com cartão...','dim');
  try {
    const r = await fetch(PROXY+'?action=card', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ encrypted: enc.encryptedCard })
    });
    const d = await r.json();
    w('HTTP Status: '+d._status, d._status===201?'ok':'err');
    wj('REQUEST — POST https://sandbox.api.pagseguro.com/orders', d._request);
    wj('RESPONSE (HTTP '+d._status+')', d._response);
    if (d._status===201) w('✅ CARTÃO OK — Status: '+d._response.charges?.[0]?.status,'ok');
    else w('❌ CARTÃO FALHOU: '+(d._response.error_messages?.[0]?.description||JSON.stringify(d._response)),'err');
  } catch(e) { w('❌ '+e.message,'err'); }
  document.getElementById('btnCard').disabled = false;
}

function copyLog() {
  const txt = log.innerText;
  navigator.clipboard.writeText(txt).then(()=>alert('✅ Log copiado!\nCole aqui para enviar ao Claude.')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('✅ Copiado!');
  });
}
</script>
</body>
</html>
