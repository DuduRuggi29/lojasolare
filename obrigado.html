<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado — Solare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f5f7f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; color: #1a1a1a; }
        .card { background: white; border-radius: 16px; padding: 40px; max-width: 500px; width: 100%; text-align: center; box-shadow: 0 4px 30px rgba(0,0,0,0.05); }
        .icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 36px; }
        .icon.success { background: #e8f5e9; color: #2e7d32; }
        .icon.pending { background: #fff8e1; color: #f57f17; }
        .icon.failure { background: #ffebee; color: #c62828; }
        
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.5; }
        
        .pix-container { background: #f9fafb; border: 1px dashed #ddd; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .qr-code { width: 200px; height: 200px; margin: 0 auto 15px; }
        .qr-code img { width: 100%; }
        .copy-box { background: white; border: 1px solid #eee; padding: 10px; border-radius: 8px; font-size: 12px; word-break: break-all; margin-bottom: 10px; color: #333; }
        .btn-copy { background: #1a1a1a; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }
        
        .btn-home { display: block; text-decoration: none; color: #2e7d32; font-weight: 700; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; transition: 0.2s; }
        .btn-home:hover { background: #f1f8e9; }
    </style>
</head>
<body>

<div class="card">
    <div id="status-icon" class="icon success"><i class="fas fa-check-circle"></i></div>
    <h1 id="status-title">Pagamento Confirmado!</h1>
    <p id="status-desc">Obrigado pela sua compra. Sua Solare será enviada em breve.</p>

    <!-- Pix Area -->
    <div id="pix-area" style="display: none;">
        <div class="pix-container">
            <div class="qr-code">
                <img id="qr-img" src="" alt="QR Code Pix">
            </div>
            <div class="copy-box" id="pix-code">Carregando código...</div>
            <button class="btn-copy" onclick="copyPix()">COPIAR CÓDIGO PIX</button>
        </div>
        <p style="font-size: 13px;">O status será atualizado automaticamente após o pagamento.</p>
    </div>

    <a href="index.html" class="btn-home">Ir para página inicial</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status');
    const type = params.get('type');
    const pixCode = params.get('qr_code');
    const pixImg = params.get('qr_code_base64');

    if (type === 'pix' && status === 'pending') {
        document.getElementById('status-icon').className = 'icon pending';
        document.getElementById('status-icon').innerHTML = '<i class="fas fa-clock"></i>';
        document.getElementById('status-title').innerText = 'Aguardando Pagamento';
        document.getElementById('status-desc').innerText = 'Para finalizar, pague o Pix abaixo:';
        document.getElementById('pix-area').style.display = 'block';
        document.getElementById('qr-img').src = `data:image/png;base64,${pixImg}`;
        document.getElementById('pix-code').innerText = pixCode;
    } else if (status === 'rejected') {
        document.getElementById('status-icon').className = 'icon failure';
        document.getElementById('status-icon').innerHTML = '<i class="fas fa-times-circle"></i>';
        document.getElementById('status-title').innerText = 'Pagamento Recusado';
        document.getElementById('status-desc').innerText = 'Não foi possível processar seu cartão. Tente novamente.';
    }

    function copyPix() {
        navigator.clipboard.writeText(pixCode).then(() => {
            alert('Código Pix copiado!');
        });
    }
</script>

</body>
</html>
